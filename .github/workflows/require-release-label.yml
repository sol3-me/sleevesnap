name: Require Release Label

on:
  pull_request:
    types: [opened, labeled, unlabeled]
    branches: [main]

jobs:
  check-label:
    name: Release label present
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Check for exactly one release label
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          release_labels=()
          while IFS= read -r label; do
            case "$label" in
              release:major|release:minor|release:patch|no-release)
                release_labels+=("$label")
                ;;
            esac
          done < <(echo "$LABELS" | jq -r '.[]')

          count=${#release_labels[@]}

          if [ "$count" -eq 0 ]; then
            # Not a hard failure: PRs are routinely opened a moment before a
            # label is attached (a separate API call, not part of `pr create`),
            # so treating this as an error meant every single PR failed CI
            # for a few seconds and fired a spurious failure notification.
            # Multiple labels (below) is a real authoring mistake and still
            # hard-fails; "no label yet" is just not-done-yet.
            echo "::warning::No release label yet on this PR — apply exactly one of: release:patch, release:minor, release:major, no-release"
            echo "::warning::Use the Labels panel on the right-hand side of the PR — writing the label name in the description does not count."
            exit 0
          fi

          if [ "$count" -gt 1 ]; then
            echo "::error::Multiple release labels found: ${release_labels[*]}"
            echo "::error::Keep exactly one release label on the PR."
            exit 1
          fi

          echo "✓ Release label present: ${release_labels[0]}"
