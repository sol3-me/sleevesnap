# sleevesnap – docker-compose
#
# Local-first, self-hosted setup: SQLite for data, local filesystem (on a
# Docker volume) for cover-art blobs. No external services required.
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d

services:

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MUSICBRAINZ_APP_NAME: "${MUSICBRAINZ_APP_NAME:-sleevesnap}"
      CACHE_DB_PATH: /data/cache.db
      STORAGE_LOCAL_PATH: /data/covers
      PUBLIC_URL: "${PUBLIC_URL:-}"

      # Optional API integrations
      DISCOGS_TOKEN: "${DISCOGS_TOKEN:-}"
      LASTFM_API_KEY: "${LASTFM_API_KEY:-}"

      # AI Vision (optional; leave blank to disable)
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      VISION_DAILY_LIMIT: "${VISION_DAILY_LIMIT:-5}"
      VISION_ADMIN_KEY: "${VISION_ADMIN_KEY:-}"
    volumes:
      - sleevesnap_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sleevesnap_data:
